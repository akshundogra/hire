<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Thanks — Workflow Request Received</title>
  <style>
    :root {
      --bg: #080808;
      --bg2: #111111;
      --border: #1f1f1f;
      --text: #e8e3db;
      --muted: #6b6b6b;
      --accent: #e8c547;
      --font: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      padding: 24px;
    }

    .card {
      width: min(680px, 100%);
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      display: grid;
      gap: 14px;
    }

    h1 {
      font-size: clamp(26px, 4vw, 36px);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    h1 em {
      color: var(--accent);
      font-style: normal;
    }

    p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .company-name {
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    a {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      text-decoration: none;
      color: var(--accent);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Thanks — I will get back to you <em>shortly.</em></h1>
    <p class="company-name">REQUEST RECEIVED</p>
    <p>
      I do not want to spend API tokens unnecessarily, so I review each request carefully first.
      I will reach out to you as soon as possible with the workflow improvement plan.
    </p>
    <a href="/">← Back to homepage</a>
  </main>
</body>
</html>
